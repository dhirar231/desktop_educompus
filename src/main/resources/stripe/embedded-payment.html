<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paiement</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; padding: 14px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    #payment-element { margin-top: 10px; }
    #error { color: #b00020; margin-top: 10px; min-height: 18px; font-size: 13px; }
    #pay { margin-top: 12px; padding: 10px 14px; border-radius: 10px; border: 0; cursor: pointer; background: #4f46e5; color: white; font-weight: 600; }
    #pay[disabled] { opacity: .6; cursor: default; }
  </style>
</head>
<body>
  <div id="payment-element"></div>
  <button id="pay">Payer</button>
  <div id="error"></div>

  <script>
    const PUBLISHABLE_KEY = "__PUBLISHABLE_KEY__";
    const CLIENT_SECRET = "__CLIENT_SECRET__";

    const stripe = Stripe(PUBLISHABLE_KEY);
    const elements = stripe.elements({ clientSecret: CLIENT_SECRET });
    const paymentElement = elements.create('payment');
    paymentElement.mount('#payment-element');

    const payBtn = document.getElementById('pay');
    const err = document.getElementById('error');

    function setError(msg) {
      err.textContent = msg || '';
      if (msg && window.javaBridge && typeof window.javaBridge.onPaymentFailed === 'function') {
        window.javaBridge.onPaymentFailed(String(msg));
      }
    }

    payBtn.addEventListener('click', async () => {
      payBtn.disabled = true;
      setError('');

      const { error, paymentIntent } = await stripe.confirmPayment({
        elements,
        confirmParams: { return_url: "https://example.com/stripe-return" },
        redirect: "if_required"
      });

      if (error) {
        payBtn.disabled = false;
        setError(error.message || "Paiement échoué.");
        return;
      }

      const status = paymentIntent && paymentIntent.status ? paymentIntent.status : "unknown";
      const id = paymentIntent && paymentIntent.id ? paymentIntent.id : "";

      if (window.javaBridge && typeof window.javaBridge.onPaymentCompleted === 'function') {
        window.javaBridge.onPaymentCompleted(String(id), String(status));
      }
    });
  </script>
</body>
</html>
